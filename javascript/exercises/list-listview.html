<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Product Listview</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bgDark: "#0f172a",
            cardDark: "#020617"
          }
        }
      }
    }
  </script>
</head>
<body class="bg-bgDark text-slate-200 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-4xl">
    <h1 class="text-2xl font-semibold mb-6 text-center">Product List</h1>

    <!-- Desktop Column Headers -->
    <div class="hidden md:grid grid-cols-3 gap-4 px-4 py-2 text-sm uppercase tracking-wide text-slate-400 border-b border-slate-700">
      <div>Product</div>
      <div>Price</div>
      <div>Availability</div>
    </div>

    <!-- Listview Container -->
    <div id="productList" class="divide-y divide-slate-800 bg-cardDark rounded-lg shadow-lg overflow-hidden">
      <!-- JS injects rows here -->
    </div>
  </div>

  <script src="list-listview.js"></script>
</body>
</html>
